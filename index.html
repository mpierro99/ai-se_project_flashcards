<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flashcard App</title>
    <meta
      name="keywords"
      content="study aids, flashcards, learning materials"
    />
    <meta name="author" content="Max Carstens" />
    <meta name="description" content="a flashcard learning app" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="assets/css/index.css" />
  </head>
  <body class="page">
    <header class="header">
      <h1 class="header__title">
        <a class="header__link" href="#home">Flash Cards</a>
      </h1>
      <nav class="nav">
        <ul class="nav__links">
          <li><a class="nav__link" href="#home">My Decks</a></li>
          <li><a class="nav__link" href="#about">About</a></li>
        </ul>
      </nav>
    </header>
    <main class="page__main-content">
      <section id="home" class="gallery">
        <h2 class="gallery__title">My Decks</h2>
        <ul class="gallery__list"></ul>
        <button class="gallery__new-card-btn" type="button">+ New Deck</button>
      </section>

      <section id="deck-view" class="gallery">
        <div class="gallery__header">
        <h2 class="gallery__title"></h2>
        <button type="button" class="gallery__practice-btn">Practice</button>
        </div>
        <div class="wrapping-row">
        <ul class="gallery__list wrapping-row__display-contents"></ul>
        <button type="button" class="gallery__new-card-btn">+ New Card</button>
        </div>
      </section>
    </main>

      <section id="not-found" class="not-found">
        <h2 class="not-found__title">404 Not Found</h2>
        <p class="not-found__description">
          Sorry, we couldn’t find that deck. Please try another one or return to
          the main list.
        </p>
      </section>
      <section id="carousel" class="carousel">
        <h2 class="carousel__title"></h2>
        <div class="carousel__cards">
          <button
            class="carousel__btn carousel__btn_type_left"
            type="button"
            aria-label="Previous card"
          ></button>
          <div class="carousel__card">
            <p class="carousel__card-text"></p>
          </div>
          <button
            class="carousel__btn carousel__btn_type_right"
            type="button"
            aria-label="Next card"
          ></button>
        </div>
        <button
          class="carousel__btn carousel__btn_type_flip"
          type="button"
          aria-label="Flip card"
        ></button>
      </section>
    </main>
    <footer class="footer">
      <p class="footer__text">&copy; 2026 Max Carstens</p>
    </footer>

    <template id="deck-template">
  <li class="card">
    <a href="#" class="card__link"></a>
    <h3 class="card__title"></h3>
    <div class="card__row">
      <p class="card__count"></p>
      <button
        type="button"
        aria-label="Delete deck"
        class="card__delete-btn"
      ></button>
    </div>
  </li>
</template>

<template id="flashcard-template">
  <li class="card">
    <h3 class="card__title"></h3>
    <div class="card__row">
      <button
        type="button"
        aria-label="Edit card"
        class="card__edit-btn"
      ></button>
      <button
        type="button"
        aria-label="Delete card"
        class="card__delete-btn"
      ></button>
    </div>
  </li>
</template>

    <script type="module" src="assets/js/index.js"></script>
  </body>
</html>
